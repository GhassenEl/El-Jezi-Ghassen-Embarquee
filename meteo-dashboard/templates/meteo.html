<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Jezi — Smart Meteo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='meteo.css') }}">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">El Jezi Ghassen — Station meteo IoT</p>
      <h1>Smart Meteo</h1>
      <p class="subtitle">Temperature, vent, pluie, pression et indice UV en temps reel</p>
    </div>
    <div class="status-pill" id="mqttStatus">MQTT …</div>
  </header>

  <main class="layout">
    <section class="cards">
      <article class="card card--temp">
        <h2>Temperature</h2>
        <p class="metric" id="tempValue">—</p>
        <p class="unit">°C · HR <span id="humValue">—</span>%</p>
      </article>
      <article class="card">
        <h2>Pression</h2>
        <p class="metric" id="pressValue">—</p>
        <p class="unit">hPa</p>
      </article>
      <article class="card card--wind">
        <h2>Vent</h2>
        <p class="metric" id="windValue">—</p>
        <p class="unit">km/h</p>
      </article>
      <article class="card card--rain">
        <h2>Pluie cumulee</h2>
        <p class="metric" id="rainValue">—</p>
        <p class="unit">mm</p>
      </article>
      <article class="card card--uv">
        <h2>Indice UV</h2>
        <p class="metric" id="uvValue">—</p>
        <p class="unit">station <strong id="stationName">—</strong></p>
      </article>
    </section>

    <section class="panel">
      <div class="panel__head"><h2>Controles station</h2></div>
      <div class="controls">
        <button type="button" class="btn" data-cmd="STATUS">Rafraichir</button>
        <button type="button" class="btn" data-cmd="RESET_RAIN">Reset pluie</button>
        <button type="button" class="btn" data-cmd="MODE_AUTO">Mode AUTO</button>
        <button type="button" class="btn" data-cmd="MODE_MANUAL">Mode MANUEL</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel__head"><h2>Alertes meteo</h2></div>
      <ul class="alert-list" id="alertList"><li class="muted">En attente…</li></ul>
    </section>

    <section class="panel">
      <div class="panel__head"><h2>Historique recent</h2></div>
      <div class="history" id="historyLog"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='meteo.js') }}"></script>
</body>
</html>
