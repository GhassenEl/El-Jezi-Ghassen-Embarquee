services:
  mosquitto-cloud:
    image: eclipse-mosquitto:2
    container_name: eljezi-home-mosquitto-cloud
    ports:
      - "1885:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_home_cloud_data:/mosquitto/data
    restart: unless-stopped

  cloud-api:
    build: ./cloud-api
    container_name: eljezi-home-cloud-api
    ports:
      - "8120:8120"
    environment:
      MQTT_BROKER: mosquitto-cloud
      MQTT_PORT: 1883
      HOME_DB_PATH: /data/home_cloud.db
      ZONES_JSON_PATH: /data/zones.json
    volumes:
      - home_cloud_db:/data
      - ../data/zones.json:/data/zones.json:ro
    depends_on:
      - mosquitto-cloud
    restart: unless-stopped

volumes:
  mosquitto_home_cloud_data:
  home_cloud_db:
